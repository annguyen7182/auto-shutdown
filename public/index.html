<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f0ece6">
  <meta name="description" content="Control your PC power state remotely">
  <title>Auto Shutdown</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Subtle texture -->
  <div class="bg-noise"></div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Status bar -->
  <header id="status-bar">
    <div class="status-left">
      <div class="status-indicator">
        <span class="connection-dot" id="connection-dot"></span>
        <span class="connection-label" id="connection-label">ONLINE</span>
      </div>
      <span class="divider-line"></span>
      <span class="pc-name" id="pc-name">---</span>
    </div>
    <div class="status-right">
      <span class="uptime-label">UPTIME</span>
      <span class="uptime" id="uptime">--</span>
      <button class="settings-btn" id="settings-btn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main page -->
  <main id="main-page" class="page active">
    <div class="hero-section">
      <div class="hero-badge">
        <span class="badge-text">Power Control</span>
      </div>

      <div class="actions-grid">
        <button class="action-btn sleep-btn" data-action="sleep" aria-label="Sleep">
          <div class="btn-face">
            <div class="btn-icon-wrap">
              <svg class="btn-icon" viewBox="0 0 48 48" fill="none">
                <path d="M34 20c0-7.18-5.82-13-13-13a13 13 0 0 0-4.5.8C20.07 9.28 23 13.3 23 18c0 6.08-4.92 11-11 11-1.97 0-3.82-.52-5.42-1.43A13.003 13.003 0 0 0 21 36c7.18 0 13-5.82 13-13z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M30 7l2.5 2.5M35 12h3M32 17l2.5-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
              </svg>
            </div>
            <span class="btn-label">Sleep</span>
          </div>
        </button>

        <button class="action-btn shutdown-btn" data-action="shutdown" aria-label="Shutdown">
          <div class="btn-face">
            <div class="btn-icon-wrap">
              <svg class="btn-icon" viewBox="0 0 48 48" fill="none">
                <path d="M24 8v12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M16.5 12.2A13 13 0 1 0 31.5 12.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="btn-label">Shut Down</span>
          </div>
        </button>

        <button class="action-btn restart-btn" data-action="restart" aria-label="Restart">
          <div class="btn-face">
            <div class="btn-icon-wrap">
              <svg class="btn-icon" viewBox="0 0 48 48" fill="none">
                <path d="M34 18A12 12 0 0 0 14.5 12.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 8v8h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 30a12 12 0 0 0 19.5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M38 40v-8h-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="btn-label">Restart</span>
          </div>
        </button>
      </div>

      <div class="system-readout">
        <span class="readout-line"></span>
        <span class="readout-text" id="readout-text">SYS READY</span>
        <span class="readout-line"></span>
      </div>
    </div>
  </main>

  <!-- Settings page -->
  <section id="settings-page" class="page">
    <div class="settings-header">
      <button class="back-btn" id="back-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <h2>Settings</h2>
    </div>

    <div class="settings-body">
      <!-- Server Info -->
      <div class="settings-group" style="animation-delay: 0.05s">
        <div class="group-label">Server</div>
        <div class="field-row">
          <label>Access URL</label>
          <input type="text" id="server-url" readonly class="field-input mono">
        </div>
      </div>

      <!-- Port Config -->
      <div class="settings-group" style="animation-delay: 0.1s">
        <div class="group-label">Port</div>
        <div class="field-row">
          <label>Port Number</label>
          <div class="field-inline">
            <input type="number" id="port-input" min="1024" max="65535" class="field-input mono" placeholder="3000">
            <button class="save-btn" id="save-port-btn">Save</button>
          </div>
        </div>
      </div>

      <!-- Network Config -->
      <div class="settings-group" style="animation-delay: 0.15s">
        <div class="group-label">Network</div>
        <div class="field-row">
          <label>Interface</label>
          <select id="interface-select" class="field-input">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="field-row">
          <label>Mode</label>
          <div class="toggle-row">
            <button class="toggle-btn active" id="dhcp-toggle" data-mode="dhcp">DHCP</button>
            <button class="toggle-btn" id="static-toggle" data-mode="static">Static</button>
          </div>
        </div>
        <div id="static-fields" class="static-fields hidden">
          <div class="field-row">
            <label>IP Address</label>
            <input type="text" id="ip-input" class="field-input mono" placeholder="192.168.1.100" inputmode="decimal">
          </div>
          <div class="field-row">
            <label>Subnet Mask</label>
            <input type="text" id="subnet-input" class="field-input mono" placeholder="255.255.255.0" inputmode="decimal">
          </div>
          <div class="field-row">
            <label>Gateway</label>
            <input type="text" id="gateway-input" class="field-input mono" placeholder="192.168.1.1" inputmode="decimal">
          </div>
        </div>
        <button class="save-btn full-width" id="save-network-btn">Apply Network</button>
      </div>
    </div>
  </section>

  <!-- Confirmation modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="confirm-modal">
      <div class="modal-icon" id="modal-icon"></div>
      <p class="modal-title" id="modal-title">CONFIRM ACTION</p>
      <p class="modal-text" id="modal-text">Are you sure?</p>
      <div class="modal-actions">
        <button class="modal-btn cancel-btn" id="modal-cancel">Cancel</button>
        <button class="modal-btn confirm-btn" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
